<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SD Studio — Admin Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .card {
    background: #141414;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 16px;
    padding: 48px 44px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6);
  }
  .logo-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 32px;
  }
  .logo-mark {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, #e11d48, #9f1239);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 900; color: #fff; letter-spacing: -1px;
  }
  .logo-text h1 {
    font-size: 20px; font-weight: 800; color: #fafafa; letter-spacing: -0.5px;
  }
  .logo-text p { font-size: 11px; color: #71717a; letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }
  .divider { height: 1px; background: rgba(255,255,255,0.06); margin-bottom: 28px; }
  label { display: block; font-size: 12px; font-weight: 600; color: #a1a1aa; margin-bottom: 8px; letter-spacing: 0.5px; }
  input[type="password"] {
    width: 100%;
    background: #0d0d0d;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 12px 16px;
    color: #fafafa;
    font-size: 15px;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="password"]:focus { border-color: #e11d48; }
  .btn {
    width: 100%;
    margin-top: 20px;
    padding: 13px;
    background: linear-gradient(135deg, #e11d48, #9f1239);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.88; }
  .error {
    background: rgba(239,68,68,0.12);
    border: 1px solid rgba(239,68,68,0.3);
    color: #fca5a5;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    margin-bottom: 18px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo-row">
    <div class="logo-mark">SD</div>
    <div class="logo-text">
      <h1>SD Studio</h1>
      <p>Admin Panel</p>
    </div>
  </div>
  <div class="divider"></div>

  {% for msg in get_flashed_messages(category_filter=["error"]) %}
  <div class="error">{{ msg }}</div>
  {% endfor %}

  <form method="post">
    <label for="password">Admin Password</label>
    <input type="password" id="password" name="password" autofocus placeholder="Enter password…">
    <button type="submit" class="btn">Sign In</button>
  </form>
</div>
</body>
</html>
